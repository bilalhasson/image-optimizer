name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # pnpm version comes from the "packageManager" field in package.json.
      # Runs before setup-node so its pnpm cache can find pnpm on PATH.
      - uses: pnpm/action-setup@v6

      # Node version comes from .nvmrc.
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build # tsc --noEmit (strict typecheck) + vite build
